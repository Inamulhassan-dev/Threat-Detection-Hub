name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Download NLTK data
        run: |
          python - <<'EOF'
          import nltk
          for pkg in ("stopwords", "punkt", "punkt_tab", "wordnet", "omw-1.4"):
              nltk.download(pkg, quiet=True)
          EOF

      - name: Lint with flake8
        run: |
          # Error on syntax errors (E9xx) and undefined names (F821)
          flake8 backend/src backend/app.py \
            --max-line-length=120 \
            --select=E9,F821 \
            --count --statistics
          # Style/quality check — warn only (exit-zero)
          flake8 backend/src backend/app.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --count --statistics --exit-zero

      - name: Run smoke tests
        working-directory: backend
        run: pytest tests/test_smoke.py -v
